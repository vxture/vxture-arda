# beta-arda.vxture.com - Arda app (beta). Source artifact owned by the arda repo.
#
# This vhost is INSTALLED on the shared vxture public edge (edge host), not run
# by the arda stack. the edge host terminates TLS with the *.vxture.com wildcard
# cert and reverse-proxies over tailscale to the beta arda-app on the deploy host
# (private compute, no public IP). Install: copy this file into the vxture project
# repository and run 20-sync-nginx-config.sh on
# the edge host. See configs/edge/README.md.

server {
    listen 80;
    listen [::]:80;
    server_name beta-arda.vxture.com;
    return 301 https://beta-arda.vxture.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name beta-arda.vxture.com;

    # Reuse the shared *.vxture.com wildcard cert (same as console/accounts).
    ssl_certificate     /etc/nginx/ssl/live/vxture.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/vxture.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;

    # -- Upstream: deploy host over tailscale (single labeled place) --------------
    # IMPORTANT - upstream name vs IP. The existing shared-edge nginx container
    # resolves only Docker DNS (127.0.0.11), so every existing vxture vhost
    # hardcodes the deploy host tailnet IP 100.76.219.48. To use the MagicDNS NAME
    # below (arda's no-raw-IP policy), the edge container must be able to query
    # tailscale MagicDNS: resolver 100.100.100.100 must be reachable from the
    # container. If that prerequisite is NOT yet in place, change ONLY this one
    # `set $arda_upstream` line to the IP form "100.76.219.48:3231". Either way
    # it is a single-line change and the upstream never appears anywhere else.
    resolver 100.100.100.100 valid=30s ipv6=off;   # tailscale MagicDNS
    set $arda_upstream "vx-worker-02:3231";            # beta; prod file uses vx-worker-02:3230

    # Internal-only endpoints must NOT be reachable from the public edge
    # (arda-plat-220 sec 4 / B2). The consume flush trigger is driven internally on
    # the tailnet; the public edge returns 404. (App-level token guard is the
    # second layer - see app/api/usage/flush/route.ts.)
    location = /api/usage/flush { return 404; }

    location / {
        proxy_pass         http://$arda_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        '';
    }
}
