# Arda - two-service stack (app + redis) behind the shared public edge.
#
# the deploy host is private compute (Tailscale-only, no public IP). This stack runs
# arda-app + arda-redis ONLY. There is NO per-service nginx and NO TLS here:
# the shared public edge terminates TLS with the wildcard
# *.vxture.com cert and reverse-proxies to arda-app's published port over
# tailscale. See configs/edge/ for the vhost arda contributes to that edge.
#
# The same file deploys two independent stacks on the deploy host by pointing at a
# different env file / root. PROJECT_NAME drives both the compose project name
# and the container_name prefix, so prod (arda-) and beta (arda-beta-) never
# collide:
#   prod : PROJECT_NAME=arda       containers arda-app / arda-redis
#   beta : PROJECT_NAME=arda-beta  containers arda-beta-app / arda-beta-redis
#
# REDIS_URL in .env points at ${PROJECT_NAME}-redis, which resolves to the
# redis container_name on this stack's network, so the app always reaches its
# own Redis and never the other environment's.
name: ${PROJECT_NAME:-arda}

networks:
  arda-net:
    driver: bridge

services:

  # -- App: Arda Next.js application (OIDC RP / app-bff) ------------------------
  # Single Next.js server on internal port 3230. It is the OIDC Authorization-
  # Code + PKCE relying party against accounts.vxture.com: tokens live server-
  # side in Redis and the browser only ever holds an opaque vx_rp_session cookie.
  arda-app:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/arda-app:${IMAGE_TAG:-latest}
    container_name: ${PROJECT_NAME:-arda}-app
    restart: always
    depends_on:
      arda-redis:
        condition: service_started
      # App routes query the DB directly, so it must be accepting connections
      # first. Schema is NOT applied here - DB structure changes go through the
      # approval-gated db-init workflow (deploy/database/, governance #7).
      arda-db:
        condition: service_healthy
    # Publish the app port so the public edge can reach it over tailscale.
    # the deploy host has no public IP, so this bind is reachable only via the
    # tailscale/LAN interface; the host firewall must allow ingress on the
    # tailscale interface ONLY (never the public interface). prod uses 3230,
    # beta uses 3231 (APP_PUBLISH_PORT), so both stacks coexist on one host.
    ports:
      - "${APP_PUBLISH_PORT:-3230}:3230"
    environment:
      PORT: "3230"
      # -- OIDC RP (Vxture App Integration Standard v1.0) --------------------
      OIDC_ISSUER: "${OIDC_ISSUER:-}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-arda}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-}"
      OIDC_REDIRECT_URI: "${OIDC_REDIRECT_URI:-}"
      OIDC_SCOPES: "${OIDC_SCOPES:-openid profile email phone}"
      OIDC_POST_LOGOUT_REDIRECT_URI: "${OIDC_POST_LOGOUT_REDIRECT_URI:-}"
      # -- Server-side RP session store (this stack's redis container) --------
      REDIS_URL: "${REDIS_URL:-redis://arda-redis:6379}"
      # -- Domain data store (this stack's postgres container) ----------------
      # Used by the Prisma client (pg driver adapter). Schema is DDL-owned and
      # only ever changed via the db-init pipeline; the entrypoint never
      # migrates. Host is ${PROJECT_NAME}-db so prod/beta never collide.
      DATABASE_URL: "${DATABASE_URL:-postgresql://arda:arda@${PROJECT_NAME:-arda}-db:5432/arda?schema=public}"
      RP_SESSION_TTL: "${RP_SESSION_TTL:-2592000}"
      RP_SESSION_COOKIE_NAME: "${RP_SESSION_COOKIE_NAME:-vx_rp_session}"
      # Host-only cookie (no leading dot): scoped to this exact domain.
      RP_SESSION_COOKIE_DOMAIN: "${RP_SESSION_COOKIE_DOMAIN:-}"
      # -- Platform API (C2 entitlement + C3 consume) -----------------------
      PLATFORM_API_URL: "${PLATFORM_API_URL:-}"
      PLATFORM_INTERNAL_AUTH_TOKEN: "${PLATFORM_INTERNAL_AUTH_TOKEN:-}"
      DATA_ENCRYPTION_KEY: "${DATA_ENCRYPTION_KEY:-}"
      INTERNAL_JOB_TOKEN: "${INTERNAL_JOB_TOKEN:-}"
      # -- Platform provisioning webhook (C3) --------------------------------
      PROVISION_WEBHOOK_SECRET: "${PROVISION_WEBHOOK_SECRET:-}"
      # -- App config --------------------------------------------------------
      DEFAULT_LANDING: "${DEFAULT_LANDING:-/dashboard}"
      MOCK_STATE: "${MOCK_STATE:-subscribed}"
      MOCK_TIER: "${MOCK_TIER:-pro}"
      # First-entry seed: when "true", a workspace arda has never recorded is
      # seeded with the default template on entry (beta/demo convenience). Leave
      # unset/false in prod - there the platform drives seeding via seedStatus.
      ARDA_SEED_AUTOFILL: "${ARDA_SEED_AUTOFILL:-false}"
    networks:
      - arda-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3230/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # -- Redis: server-side OIDC RP session store --------------------------------
  # Holds the OIDC authreq handshake, RP sessions (identity claims), the token
  # bundle (BFF-only), and the sid->rpsid back-channel logout index. OIDC tokens
  # never reach the browser. Internal-only (no published ports). Append-only
  # persistence under DATA_DIR survives restarts and redeploys.
  arda-redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-arda}-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--save", "", "--maxmemory-policy", "noeviction"]
    volumes:
      - ${DATA_DIR}/redis:/data
    networks:
      - arda-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # -- Postgres: domain/business data store (catalog + governance, v1) ---------
  # Holds arda-owned business data (datasets, sources, policies, quality, etc.),
  # workspace-isolated by workspaceId. NOT the OIDC session store (that is redis)
  # and NOT subscription/billing (that is the vxture platform). Internal-only (no
  # published ports). Data under DATA_DIR survives restarts and redeploys; prod
  # and beta use separate stacks/dirs so their data never mixes.
  arda-db:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-arda}-db
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-arda}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-arda}"
      POSTGRES_DB: "${POSTGRES_DB:-arda}"
    volumes:
      - ${DATA_DIR}/postgres:/var/lib/postgresql/data
    networks:
      - arda-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arda} -d ${POSTGRES_DB:-arda}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
