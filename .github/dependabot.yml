version: 2
updates:
  # pnpm workspace root (portals/ - covers @arda/app and @arda/shared members).
  # Dependabot's "npm" ecosystem reads pnpm-lock.yaml too.
  - package-ecosystem: npm
    directory: /portals
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # @vxture/* is org-internal and needs a deliberate look, not batched.
      vxture-packages:
        patterns:
          - '@vxture/*'
    ignore:
      # @vxture/* moves on its own release cadence from a different repo -
      # bump it deliberately, not via an automated PR.
      - dependency-name: '@vxture/*'
      # TypeScript majors (e.g. 5 -> 7, the native/Go compiler rewrite) are a
      # deliberate migration, not routine maintenance: TS 7 stops resolving
      # side-effect `.css` imports without an ambient `declare module '*.css'`
      # and needs a full app regression. Keep taking minor/patch; do the major
      # as a dedicated PR. See #129.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  # Keep pinned Action versions (docker/build-push-action@v7, actions/checkout@v6,
  # etc.) current - these live outside npm and would otherwise drift silently.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
