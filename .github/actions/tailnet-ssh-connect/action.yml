name: tailnet-ssh-connect
description: >
  Join the tailnet and prepare an SSH key + known_hosts for the deploy host.
  Shared by every workflow that SSHes to ARDA_DEPLOY_HOST (deploy.yml,
  seed-demo-data.yml, rollback.yml) so the connection logic has one place to
  change. Stores no credentials itself - every value is an input threaded
  through from the caller's own secrets/vars context.

inputs:
  tailscale-oauth-client-id:
    required: true
  tailscale-oauth-secret:
    required: true
  tailscale-tag:
    required: true
  deploy-host:
    required: true
  deploy-port:
    required: false
    default: ''
  deploy-ssh-key:
    required: true
  deploy-known-hosts:
    required: false
    default: ''

runs:
  using: composite
  steps:
    # ephemeral=true (the action's default) auto-removes the node after the
    # job ends. The ping option waits up to 3 minutes for a direct/relayed
    # connection to the deploy host BEFORE the caller's SSH steps run - fast
    # failure instead of a silent SSH timeout.
    - name: Connect to Tailscale
      # Pinned to a full commit SHA (supply-chain): this action receives the
      # tailnet OAuth client-id/secret, so a moved tag must not be able to run
      # new code. Dependabot bumps the SHA and updates the version comment.
      uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
      with:
        oauth-client-id: ${{ inputs.tailscale-oauth-client-id }}
        oauth-secret: ${{ inputs.tailscale-oauth-secret }}
        tags: ${{ inputs.tailscale-tag }}
        ping: ${{ inputs.deploy-host }}

    - name: Prepare SSH
      shell: bash
      env:
        DEPLOY_HOST: ${{ inputs.deploy-host }}
        DEPLOY_PORT: ${{ inputs.deploy-port }}
        DEPLOY_SSH_KEY: ${{ inputs.deploy-ssh-key }}
        DEPLOY_KNOWN_HOSTS: ${{ inputs.deploy-known-hosts }}
      run: |
        set -euo pipefail
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key

        port="${DEPLOY_PORT:-22}"
        if [ -n "${DEPLOY_KNOWN_HOSTS:-}" ]; then
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
        else
          # Fail closed: an empty DEPLOY_KNOWN_HOSTS previously fell back to
          # ssh-keyscan, which trusts whatever key the network returns (TOFU /
          # MITM). Require the pinned host key instead.
          echo "::error::DEPLOY_KNOWN_HOSTS is empty - refusing trust-on-first-use via ssh-keyscan." >&2
          echo "Populate the DEPLOY_KNOWN_HOSTS secret with the deploy host's SSH host key(s), e.g." >&2
          echo "  ssh-keyscan -p <port> <host>   # run once from a trusted network, then store the output" >&2
          exit 1
        fi
        chmod 600 ~/.ssh/known_hosts
