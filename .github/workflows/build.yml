name: build

on:
  # Called by deploy.yml (tag-triggered) after routing the tag to an
  # environment.
  workflow_call:
    inputs:
      pass_sha:
        description: Commit SHA to build and tag
        required: true
        type: string
    secrets:
      NODE_AUTH_TOKEN:
        required: true
      ALIYUN_ACR_USERNAME:
        required: true
      ALIYUN_ACR_PASSWORD:
        required: true
    outputs:
      image_tag:
        description: Immutable sha-<short> tag the deploy job should pull by
        value: ${{ jobs.docker-build.outputs.image_tag }}

  # Manual trigger so the workflow has a visible execution record in the
  # Actions UI. Defaults build the current branch's HEAD.
  workflow_dispatch:
    inputs:
      pass_sha:
        description: Commit SHA to build and tag (defaults to branch HEAD)
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: write
  security-events: write  # upload trivy SARIF results to the code scanning tab

jobs:
  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # arda owns exactly one image (enforced by 06-check-deploy-contracts.py),
    # so the matrix always has exactly one combination - safe to surface a
    # single job-level output from the one matrix job's step output.
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    env:
      GHCR_NAMESPACE: vxture
      # ALIYUN_ACR_REGISTRY/NAMESPACE are public identifiers, not credentials -
      # org/repo vars, not secrets (org standard: docs/rebuild/README.md #2 in
      # vxture-platform).
      ACR_REGISTRY: ${{ vars.ALIYUN_ACR_REGISTRY }}
      ACR_NAMESPACE: ${{ vars.ALIYUN_ACR_NAMESPACE }}
      VXTURE_NPM_REGISTRY: ${{ vars.VXTURE_NPM_REGISTRY }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: arda-app
            context: ./portals
            dockerfile: ./portals/app/Dockerfile

    steps:
      - name: Resolve build SHA
        id: sha
        shell: bash
        env:
          CALLER_SHA: ${{ inputs.pass_sha }}
          DEFAULT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # workflow_call always passes pass_sha; workflow_dispatch leaves it
          # empty by default, so fall back to the branch HEAD.
          resolved="${CALLER_SHA:-$DEFAULT_SHA}"
          test -n "$resolved"
          echo "sha=$resolved" >> "$GITHUB_OUTPUT"
          echo "resolved: sha=$resolved"

      - name: Validate registry secrets
        shell: bash
        env:
          PASSED_SHA: ${{ steps.sha.outputs.sha }}
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$PASSED_SHA"
          test -n "$ACR_REGISTRY"
          test -n "$ACR_NAMESPACE"
          test -n "$ALIYUN_ACR_USERNAME"
          test -n "$ALIYUN_ACR_PASSWORD"
          test -n "$NODE_AUTH_TOKEN"

      - name: Checkout passed revision
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.sha.outputs.sha }}

      - name: Compute image metadata
        id: meta
        shell: bash
        env:
          PASSED_SHA: ${{ steps.sha.outputs.sha }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          short_sha="${PASSED_SHA::7}"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          # sha-<short> is the immutable per-commit build-dedup tag: if the same
          # commit is later tagged again (e.g. a v*.*.* cut at a commit already
          # validated under a prior beta-* tag), the existence check below skips
          # a redundant rebuild. ref_tag is the exact pushed tag name
          # (beta-YYYYMMDD.N or vX.Y.Z) - published unstripped, since that is
          # the literal ref the deploy job pulls by.
          echo "image_tag=sha-$short_sha" >> "$GITHUB_OUTPUT"
          echo "ref_tag=$REF_NAME" >> "$GITHUB_OUTPUT"

      # Buildx setup intermittently fails pulling the buildkit image (infra
      # flake, not code). Tolerate the first failure and retry once before the
      # job gives up, so a transient flake does not fail the whole release.
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        continue-on-error: true

      - name: Set up Docker Buildx (retry)
        if: ${{ steps.buildx.outcome == 'failure' }}
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Decide build vs retag
        id: decide
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          set -euo pipefail
          ghcr_repo="ghcr.io/${GHCR_NAMESPACE}/${IMAGE}"
          acr_repo="${ACR_REGISTRY}/${ACR_NAMESPACE}/${IMAGE}"

          # Every tag push is a deliberate release action (arda owns exactly one
          # image, and there is no branch-push change-classifier to gate on
          # anymore). The only thing worth skipping is a redundant rebuild: if
          # this exact commit was already built and pushed under an earlier tag
          # (e.g. a v*.*.* cut at a commit a beta-* tag already validated),
          # retag the existing digest instead of rebuilding it. Check BOTH
          # registries, not just GHCR - the retag step below copies from each
          # registry's own existing tag, so if one registry is missing it
          # (e.g. a prior partial push failure) a GHCR-only check would send
          # the retag step into a "source ref not found" failure instead of
          # just rebuilding.
          if docker buildx imagetools inspect "${ghcr_repo}:${IMAGE_TAG}" >/dev/null 2>&1 \
            && docker buildx imagetools inspect "${acr_repo}:${IMAGE_TAG}" >/dev/null 2>&1; then
            exists=true
          else
            exists=false
          fi

          if [ "$exists" = false ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi
          echo "decide: image=$IMAGE exists=$exists"

      - name: Build and push image
        if: ${{ steps.decide.outputs.build == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          # GitHub Actions cache backend: reuses unchanged layers (e.g. npm
          # install) across separate build runs instead of building from
          # scratch every time (GH-hosted runners are otherwise always a cold
          # VM with no local Docker cache to reuse).
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # GITHUB_TOKEN lacks read_package permission for @vxture/* packages
          # (they live under a different repo). Use NODE_AUTH_TOKEN PAT instead.
          # If Docker build fails with 401, the PAT has likely expired and
          # needs to be renewed with read:packages scope.
          build-args: |
            VXTURE_NPM_REGISTRY=${{ env.VXTURE_NPM_REGISTRY }}
            NODE_AUTH_TOKEN=${{ secrets.NODE_AUTH_TOKEN }}
          tags: |
            ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ matrix.image }}:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ matrix.image }}:${{ steps.meta.outputs.ref_tag }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ matrix.image }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ matrix.image }}:${{ steps.meta.outputs.ref_tag }}

      # Report-only: never fails the build/deploy (exit-code 0). Only runs on
      # an actual build - a retagged/unchanged image was already scanned in
      # the run that originally built it, no need to rescan an unchanged
      # digest. Results land in the repo's Security > Code scanning tab
      # (free for public repos, no GHAS license needed).
      - name: Scan image for vulnerabilities (trivy, report-only)
        if: ${{ steps.decide.outputs.build == 'true' }}
        # Pinned to a full commit SHA (supply-chain): runs in a job holding
        # packages:write + ACR/NPM tokens. Dependabot bumps SHA + comment.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ matrix.image }}:${{ steps.meta.outputs.image_tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload vulnerability scan results
        if: ${{ steps.decide.outputs.build == 'true' }}
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Retag unchanged image by digest
        if: ${{ steps.decide.outputs.build == 'false' }}
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          REF_TAG: ${{ steps.meta.outputs.ref_tag }}
        run: |
          set -euo pipefail
          # The commit was already built and pushed under a prior tag; do not
          # rebuild (a rebuild would mint a new digest and force a pointless
          # container recreate on deploy). Re-point the immutable sha tag and
          # this tag's own ref name at the existing digest.
          for repo in \
            "ghcr.io/${GHCR_NAMESPACE}/${IMAGE}" \
            "${ACR_REGISTRY}/${ACR_NAMESPACE}/${IMAGE}"; do
            source_ref="${repo}:${IMAGE_TAG}"
            echo "Retagging ${source_ref} -> ${repo}:${IMAGE_TAG}, ${repo}:${REF_TAG}"
            docker buildx imagetools create \
              -t "${repo}:${IMAGE_TAG}" \
              -t "${repo}:${REF_TAG}" \
              "${source_ref}"
          done
