name: ci

on:
  pull_request:
    branches:
      - main
  # push:main runs the same gates on the squash commit that actually lands on
  # main. The PR run validates an identical tree (strict/up-to-date-with-base
  # ruleset), but the squash commit itself is a new SHA the PR run never saw,
  # and org governance mandates CI on both PR and push:main
  # (vxture-platform docs/10-standards/140-repo-governance-standard.md #1).
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Repo-global checks that do not depend on portal node_modules. Runs in
  # parallel with the portal-build job.
  static-checks:
    name: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Static script checks
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          for file in deploy/*.sh deploy/scripts/*.sh deploy/lib/*.sh scripts/checks/*.sh scripts/github/*.ps1; do
            [ -f "$file" ] || continue
            case "$file" in
              *.sh) bash -n "$file" ;;
            esac
          done
          # services/ is optional in arda; compile only the dirs that exist.
          compile_targets=(deploy scripts)
          [ -d services ] && compile_targets+=(services)
          python -m compileall -q "${compile_targets[@]}"
          python scripts/checks/06-check-deploy-contracts.py
          # The single arda app must consume @vxture/design-system only - no
          # self-built design primitives (raw colors, local fonts, duplicated
          # component CSS).
          python scripts/checks/09-check-ds-usage.py --strict
          # Docs numbering iron rule (org docs taxonomy): unnumbered .md under
          # docs/ = temporary = blocked. Always runs, including docs-only PRs.
          node scripts/guardrails/check-docs-numbering.mjs --strict
          # DDL-authority guardrail (governance #7): schema.prisma, the
          # hand-written baseline DDL and the column-lock whitelist must stay
          # in lockstep; seed must stay idempotent.
          node scripts/guardrails/check-data-architecture.mjs

      - name: Cache actionlint binary
        id: actionlint-cache
        uses: actions/cache@v6
        with:
          path: /tmp/actionlint-bin
          key: actionlint-1.7.7-linux-amd64

      - name: Download actionlint (cache miss only)
        if: ${{ steps.actionlint-cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          version=1.7.7
          sha256=023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757
          url="https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_amd64.tar.gz"
          mkdir -p /tmp/actionlint-bin
          curl -fsSL "$url" -o /tmp/actionlint.tar.gz
          echo "${sha256}  /tmp/actionlint.tar.gz" | sha256sum -c -
          tar -xzf /tmp/actionlint.tar.gz -C /tmp/actionlint-bin actionlint

      # GitHub validates the WHOLE workflow file at trigger time; a single
      # invalid construct (e.g. an empty choice option) startup-fails every
      # trigger of that workflow, including tag deploys. actionlint catches
      # this class at PR time (pinned binary, same idiom as gitleaks/osv).
      - name: Workflow semantic lint (actionlint)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x /tmp/actionlint-bin/actionlint
          /tmp/actionlint-bin/actionlint -shellcheck= -pyflakes=

      - name: Docker Compose config validation
        shell: bash
        run: |
          set -euo pipefail
          docker compose --env-file .env.example config --quiet

  # Single arda app. type-check + production build run together. The Next.js
  # build cache is restored/saved to make repeat builds incremental instead of
  # cold. Named `build` to match the org-standard required-check contexts
  # (main-ruleset.json: quality-gate/build/audit/gitleaks).
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Scope the @vxture registry PAT to the only job that installs npm deps;
    # static-checks and audit never need it, so it should not be workflow-wide.
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Skip the actual npm/build work (the expensive part of this job) when
      # the PR touches nothing that could affect the build - docs and root
      # meta files only. Allow-list / default-build: any path not explicitly
      # recognized as docs-only keeps the build running (fail-open), same
      # philosophy as the deploy-side classify_changes.py had before tag-
      # triggered deploys made it unnecessary there. The job itself always
      # runs and always succeeds (steps are skipped via `if:`, not the job),
      # so quality-gate's `needs: portal-build` aggregation is unaffected.
      - name: Determine if the Next.js build is needed
        id: changes
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "$BASE_SHA" ] || ! files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>&1)"; then
            echo "run_build=true" >> "$GITHUB_OUTPUT"
            echo "decide: no usable base SHA or diff failed - fail-open, running build"
            exit 0
          fi
          if [ -z "$files" ]; then
            echo "run_build=false" >> "$GITHUB_OUTPUT"
            echo "decide: no changed files - skipping build"
            exit 0
          fi
          docs_only=true
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/*|*.md) ;;
              .gitattributes|.editorconfig|.gitignore|.npmrc|.gitleaks.toml) ;;
              *) docs_only=false ;;
            esac
          done <<<"$files"
          if [ "$docs_only" = true ]; then
            echo "run_build=false" >> "$GITHUB_OUTPUT"
            echo "decide: docs-only change - skipping build"
          else
            echo "run_build=true" >> "$GITHUB_OUTPUT"
            echo "decide: source-relevant change - running build"
          fi

      - name: Set up pnpm
        if: ${{ steps.changes.outputs.run_build == 'true' }}
        uses: pnpm/action-setup@v4
        with:
          version: "10.30.3"

      - name: Set up Node.js
        if: ${{ steps.changes.outputs.run_build == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Restore Next.js build cache
        if: ${{ steps.changes.outputs.run_build == 'true' }}
        uses: actions/cache@v6
        with:
          path: portals/app/.next/cache
          key: nextcache-app-${{ hashFiles('portals/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nextcache-app-${{ hashFiles('portals/pnpm-lock.yaml') }}-
            nextcache-app-

      # Install the whole pnpm workspace from portals/. The committed
      # portals/.npmrc declares the @vxture registry, node-linker=hoisted, and a
      # `//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}` line pnpm expands
      # from the job env - so the secret never passes through the shell and no
      # .npmrc is written at build time. A co-located .npmrc is required because
      # the token is dropped on the GitHub Packages tarball fetch otherwise.
      - name: Install dependencies
        if: ${{ steps.changes.outputs.run_build == 'true' }}
        shell: bash
        working-directory: portals
        run: |
          set -euo pipefail
          pnpm install --no-frozen-lockfile

      - name: Upload regenerated pnpm-lock.yaml (health-identity bootstrap - temporary)
        if: ${{ steps.changes.outputs.run_build == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-lock
          path: portals/pnpm-lock.yaml
          if-no-files-found: error

      - name: Type check
        if: ${{ steps.changes.outputs.run_build == 'true' }}
        shell: bash
        working-directory: portals
        run: |
          set -euo pipefail
          pnpm --filter @arda/app run type-check

      - name: Production build
        if: ${{ steps.changes.outputs.run_build == 'true' }}
        shell: bash
        working-directory: portals
        run: |
          set -euo pipefail
          pnpm --filter @arda/app run build

  # Unit test gate. Independent required check (org standard 140 SS1 five-check
  # set; rectification A2), not folded into quality-gate - it gets its own
  # visible status like `audit`. Runs the app's node:test suite (tsx loader).
  # It is evergreen on docs-only PRs (install/test steps skipped via `if:`, the
  # job still succeeds so the `test-coverage` context is always reported); on
  # source PRs a failing test blocks the merge. Named exactly `test-coverage`
  # to match the main-ruleset required-check context.
  test-coverage:
    name: test-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Same @vxture registry PAT scoping as `build`: pnpm install pulls @vxture/*.
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Mirror the build job's docs-only skip: no need to install the workspace
      # or run tests when the PR touches only docs / root meta files. The job
      # itself always runs and always succeeds (steps gate on `if:`), so the
      # required `test-coverage` context is reported on every PR.
      - name: Determine if tests need to run
        id: changes
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "$BASE_SHA" ] || ! files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>&1)"; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "decide: no usable base SHA or diff failed - fail-open, running tests"
            exit 0
          fi
          if [ -z "$files" ]; then
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "decide: no changed files - skipping tests"
            exit 0
          fi
          docs_only=true
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/*|*.md) ;;
              .gitattributes|.editorconfig|.gitignore|.npmrc|.gitleaks.toml) ;;
              *) docs_only=false ;;
            esac
          done <<<"$files"
          if [ "$docs_only" = true ]; then
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "decide: docs-only change - skipping tests"
          else
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "decide: source-relevant change - running tests"
          fi

      - name: Set up pnpm
        if: ${{ steps.changes.outputs.run_tests == 'true' }}
        uses: pnpm/action-setup@v4
        with:
          version: "10.30.3"

      - name: Set up Node.js
        if: ${{ steps.changes.outputs.run_tests == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: portals/pnpm-lock.yaml

      # Install via the committed portals/.npmrc (registry + node-linker + the
      # NODE_AUTH_TOKEN-expanded auth line); see the build job's comment.
      - name: Install dependencies
        if: ${{ steps.changes.outputs.run_tests == 'true' }}
        shell: bash
        working-directory: portals
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      # `--if-present` keeps this evergreen (140 SS1: the context must report
      # green even before any test script exists), while still hard-failing a
      # real test failure once the app defines a `test` script and test files.
      - name: Run unit tests
        if: ${{ steps.changes.outputs.run_tests == 'true' }}
        shell: bash
        working-directory: portals
        run: |
          set -euo pipefail
          pnpm --filter @arda/app run test --if-present

  # Secret scanning lives in .github/workflows/secret-scan.yml as its own
  # `gitleaks` required check (org standard layer 2): full-history detect,
  # pinned binary, rules in .gitleaks.toml.

  # SCA (dependency vulnerability) gate. Independent required check, not
  # folded into quality-gate's aggregation - matches the org-wide standard
  # (vxture-platform docs/10-standards/140-repo-governance-standard.md #9), and a
  # security-critical gate deserves its own visible status rather than being
  # buried inside an aggregate. Hard-blocks: any new finding must be fixed or
  # explicitly accepted in .osv-scanner.toml, never silenced by removing this
  # check or adding continue-on-error.
  audit:
    name: audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache osv-scanner binary
        id: osv-scanner-cache
        uses: actions/cache@v6
        with:
          path: /tmp/osv-scanner-bin
          key: osv-scanner-2.4.0-linux-amd64

      - name: Download osv-scanner (cache miss only)
        if: ${{ steps.osv-scanner-cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          version=2.4.0
          sha256=15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0
          url="https://github.com/google/osv-scanner/releases/download/v${version}/osv-scanner_linux_amd64"
          mkdir -p /tmp/osv-scanner-bin
          curl -fsSL "$url" -o /tmp/osv-scanner-bin/osv-scanner
          echo "${sha256}  /tmp/osv-scanner-bin/osv-scanner" | sha256sum -c -
          chmod +x /tmp/osv-scanner-bin/osv-scanner

      - name: Scan dependencies for known vulnerabilities (osv-scanner)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x /tmp/osv-scanner-bin/osv-scanner
          # --config is NOT auto-discovered when scanning a specific lockfile
          # path (only when scanning a directory) - must pass it explicitly or
          # the ignore-list silently does nothing. Exit code 1 on any finding
          # propagates and fails this step (no special handling needed).
          /tmp/osv-scanner-bin/osv-scanner scan \
            -L portals/pnpm-lock.yaml \
            --config .osv-scanner.toml

  # Aggregator that preserves the required status-check name. Branch rulesets
  # require "quality-gate"; keeping this job named exactly that means the
  # required check still maps after splitting the work into parallel jobs. It
  # only succeeds when every upstream job succeeds; any failure leaves this job
  # skipped, which the ruleset treats as not-passing and blocks the merge.
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [static-checks, build]

    steps:
      - name: Confirm upstream gates passed
        shell: bash
        run: echo "static-checks and build succeeded"
