name: deploy

on:
  push:
    tags:
      # beta-YYYYMMDD.N -> beta environment, vX.Y.Z -> production environment.
      # The detect job maps the tag prefix to its GitHub Environment; the
      # deploy job binds to that environment so beta and production each
      # carry their own DEPLOY_* secrets and (production only) a required
      # human-reviewer gate.
      - 'beta-*'
      - 'v*.*.*'
  # workflow_dispatch allows manual triggering from the Actions UI or CLI,
  # used for debugging the pipeline without cutting a real tag.
  workflow_dispatch:
    inputs:
      explicit_environment:
        description: "Override environment detection (beta-*->beta, v*.*.*->production). Use only for debugging."
        required: false
        type: choice
        # GitHub rejects an empty-string choice option at workflow validation
        # time (the whole file startup-fails, killing tag deploys too) - use
        # an explicit 'auto' sentinel for "no override" instead.
        default: auto
        options:
          - auto
          - beta
          - production

# Serialize deploys per TARGET ENVIRONMENT (not per tag): two different tags to
# the same stack (e.g. beta-...1 then beta-...2), and a deploy vs a rollback of
# the same env, must not run against one host concurrently. Keying on the tag
# ref let them race; keying on the resolved environment matches rollback.yml /
# db-init.yml (deploy-<env>). An in-flight deploy is never cancelled. Beta and
# production stay in separate queues. The expression mirrors the detect job's
# routing (explicit_environment override, else v* -> production, else beta).
concurrency:
  group: deploy-${{ (inputs.explicit_environment != '' && inputs.explicit_environment != 'auto' && inputs.explicit_environment) || (startsWith(github.ref_name, 'v') && 'production') || 'beta' }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  detect:
    name: detect-target-environment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      environment: ${{ steps.route.outputs.environment }}
    steps:
      - name: Route tag prefix to GitHub Environment
        id: route
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          EXPLICIT_ENV: ${{ inputs.explicit_environment || '' }}
        run: |
          set -euo pipefail

          # Tag prefix -> GitHub Environment routing. Any other tag/ref must
          # never reach a deploy. workflow_dispatch can override via
          # explicit_environment input.
          if [ -n "$EXPLICIT_ENV" ] && [ "$EXPLICIT_ENV" != "auto" ]; then
            environment="$EXPLICIT_ENV"
            echo "override: environment=$environment (explicit via workflow_dispatch)"
          else
            case "$TAG" in
              beta-*) environment=beta ;;
              v*.*.*) environment=production ;;
              *) echo "deploy.yml triggered on unsupported tag: $TAG" >&2; exit 1 ;;
            esac
          fi

          echo "environment=$environment" >> "$GITHUB_OUTPUT"
          echo "route: tag=$TAG -> environment=$environment"

  call-build:
    name: docker-build
    uses: ./.github/workflows/build.yml
    needs: detect
    # A called workflow may not request MORE permissions than the caller
    # grants this job - build.yml needs security-events: write (trivy SARIF
    # upload), and without this explicit grant GitHub startup-fails the WHOLE
    # run at validation time (zero jobs, "startup_failure"). The workflow-level
    # permissions above stay minimal; only this call gets the wider set.
    permissions:
      contents: read
      packages: write
      security-events: write
    with:
      pass_sha: ${{ github.sha }}
    secrets:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
      ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
      ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [detect, call-build]
    permissions:
      contents: read
      packages: read
      issues: write  # deploy-failure/deploy-recovered issue notifications
    # Tag-routed environment: beta-* -> beta, v*.*.* -> production. The
    # environment supplies its own DEPLOY_HOST/DEPLOY_USER/DEPLOY_SSH_KEY/
    # DEPLOY_KNOWN_HOSTS/DEPLOY_REPO_DIR, so the same job deploys to the right
    # host with the right credentials. production also carries a required
    # human-reviewer protection rule - the job pauses here until approved.
    environment:
      name: ${{ needs.detect.outputs.environment }}

    steps:
      # rsync pushes the deploy subset from the runner checkout (no git on the
      # server), so the deploy job must check out the built revision first.
      - name: Checkout deploy sources
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Validate deployment secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          ALIYUN_ACR_REGISTRY: ${{ vars.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_NAMESPACE: ${{ vars.ALIYUN_ACR_NAMESPACE }}
          TAILSCALE_OAUTH_CLIENT_ID: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          TAILSCALE_OAUTH_CLIENT_SECRET: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$ALIYUN_ACR_REGISTRY"
          test -n "$ALIYUN_ACR_NAMESPACE"
          test -n "$TAILSCALE_OAUTH_CLIENT_ID"
          test -n "$TAILSCALE_OAUTH_CLIENT_SECRET"

      - name: Join tailnet and prepare SSH
        uses: ./.github/actions/tailnet-ssh-connect
        with:
          tailscale-oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          tailscale-oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tailscale-tag: ${{ vars.TAILSCALE_OAUTH_CLIENT_TAG }}
          deploy-host: ${{ secrets.DEPLOY_HOST }}
          deploy-port: ${{ secrets.DEPLOY_PORT }}
          deploy-ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}
          deploy-known-hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

      - name: Bootstrap environment on target host
        shell: bash
        env:
          DEPLOY_ENV: ${{ needs.detect.outputs.environment }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          ENV_FILE_B64: ${{ secrets.ENV_FILE_BASE64 }}
        run: |
          set -euo pipefail
          port="${DEPLOY_PORT:-22}"

          # Compute stack root from environment
          case "$DEPLOY_ENV" in
            production) stack_root="/srv/md0/arda" ;;
            beta)       stack_root="/srv/md1/arda-beta" ;;
            *) echo "unknown environment: $DEPLOY_ENV" >&2; exit 1 ;;
          esac

          echo "[bootstrap] Checking $stack_root/etc/.env on $DEPLOY_HOST..."
          if ssh -i ~/.ssh/deploy_key -p "$port" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o ConnectTimeout=30 \
            "$DEPLOY_USER@$DEPLOY_HOST" "test -f '$stack_root/etc/.env'"; then
            echo "[bootstrap] $stack_root/etc/.env already exists - skipping"
          else
            echo "[bootstrap] Creating $stack_root/etc/.env from environment secret..."
            ssh -i ~/.ssh/deploy_key -p "$port" \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=20 \
              -o ConnectTimeout=30 \
              "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$stack_root/etc'"
            printf '%s' "$ENV_FILE_B64" | ssh -i ~/.ssh/deploy_key -p "$port" \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=20 \
              -o ConnectTimeout=30 \
              "$DEPLOY_USER@$DEPLOY_HOST" "base64 -d > '$stack_root/etc/.env' && chmod 600 '$stack_root/etc/.env'"
            echo "[bootstrap] .env created successfully"
          fi

      - name: Deploy over SSH
        shell: bash
        env:
          DEPLOY_ENV: ${{ needs.detect.outputs.environment }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_REPO_DIR: ${{ secrets.DEPLOY_REPO_DIR }}
          PASSED_SHA: ${{ github.sha }}
          IMAGE_TAG: ${{ needs.call-build.outputs.image_tag }}
          ALIYUN_ACR_REGISTRY: ${{ vars.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_NAMESPACE: ${{ vars.ALIYUN_ACR_NAMESPACE }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          GHCR_REGISTRY: ghcr.io
          GHCR_NAMESPACE: vxture
        run: |
          set -euo pipefail
          port="${DEPLOY_PORT:-22}"
          # Per-environment default deploy directory; the DEPLOY_REPO_DIR
          # environment secret overrides it when set.
          case "$DEPLOY_ENV" in
            production) default_dir="/srv/md0/arda/deploy" ;;
            beta)       default_dir="/srv/md1/arda-beta/deploy" ;;
            *) echo "unknown environment: $DEPLOY_ENV" >&2; exit 1 ;;
          esac
          deploy_dir="${DEPLOY_REPO_DIR:-$default_dir}"
          # Deploy pulls by the immutable sha-<short> tag call-build's own
          # meta step computed and published as a job output - reading it
          # here instead of recomputing from PASSED_SHA keeps the tag format
          # a single source of truth. Sidesteps any ambiguity from the
          # human-facing release tag (beta-YYYYMMDD.N / vX.Y.Z) needing
          # exact, unstripped matching.
          image_tag="$IMAGE_TAG"
          test -n "$image_tag"

          # No git clone on the server. Push only the deploy subset (deploy/,
          # configs/, docker-compose.yml) with rsync; the runner checkout is the
          # exact built SHA, so a VERSION file records provenance in place of a
          # remote `git rev-parse`. deploy/ is disposable: the operator .env lives
          # at <root>/etc/.env, outside the rsync target, so --delete is safe.
          ssh -i ~/.ssh/deploy_key -p "$port" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o ConnectTimeout=30 \
            "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$deploy_dir'"

          # Assemble the exact payload into one staging tree, then a SINGLE
          # --delete rsync. rsync's --delete with multiple sources into one dest
          # is unreliable - the delete pass for `deploy/` (contents into dest
          # root) could drop the sibling `configs/` and `docker-compose.yml`,
          # leaving the host on a stale compose. Staging makes --delete safe.
          stage="$(mktemp -d)"
          cp -a deploy/. "$stage/"
          cp -a configs "$stage/configs"
          cp -a docker-compose.yml "$stage/docker-compose.yml"
          rsync -az --delete --exclude='VERSION' \
            -e "ssh -i ~/.ssh/deploy_key -p $port -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o ConnectTimeout=30" \
            "$stage/" \
            "$DEPLOY_USER@$DEPLOY_HOST:$deploy_dir/"
          rm -rf "$stage"

          # Sanity-log what landed: confirm the compose the host will use carries
          # the expected services (catches stale-compose delivery regressions).
          ssh -i ~/.ssh/deploy_key -p "$port" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o ConnectTimeout=30 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "grep -q 'arda-db' '$deploy_dir/docker-compose.yml' && echo '[deliver] docker-compose.yml has arda-db' || echo '[deliver] WARN: arda-db missing in $deploy_dir/docker-compose.yml'"

          ssh -i ~/.ssh/deploy_key -p "$port" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o ConnectTimeout=30 \
            "$DEPLOY_USER@$DEPLOY_HOST" "printf '%s\n' '$PASSED_SHA' > '$deploy_dir/VERSION'"

          cat > /tmp/deploy.sh <<'REMOTE_SCRIPT'
          set -euo pipefail

          cd "$REPO_DIR"

          export IMAGE_REGISTRY="$GHCR_REGISTRY"
          export IMAGE_NAMESPACE="$GHCR_NAMESPACE"
          export IMAGE_TAG="$IMAGE_TAG"

          docker_login_with_retry() {
            local attempt
            for attempt in 1 2 3 4 5 6; do
              curl -fsSI "https://${ALIYUN_ACR_REGISTRY}/v2/" >/dev/null 2>&1 || true
              if printf '%s' "$ALIYUN_ACR_PASSWORD" \
                | timeout 45 docker login "$ALIYUN_ACR_REGISTRY" -u "$ALIYUN_ACR_USERNAME" --password-stdin; then
                return 0
              fi
              sleep $((attempt * 5))
            done
            return 1
          }

          if [ -n "${ALIYUN_ACR_USERNAME:-}" ] && [ -n "${ALIYUN_ACR_PASSWORD:-}" ]; then
            docker_login_with_retry
          fi

          if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
            printf '%s' "$GHCR_TOKEN" \
              | docker login "$GHCR_REGISTRY" -u "$GHCR_USERNAME" --password-stdin
          fi

          export FALLBACK_IMAGE_REGISTRY="$ALIYUN_ACR_REGISTRY"
          export FALLBACK_IMAGE_NAMESPACE="$ALIYUN_ACR_NAMESPACE"

          bash deploy.sh all
          bash deploy.sh verify
          REMOTE_SCRIPT

          scp -i ~/.ssh/deploy_key -P "$port" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o ConnectTimeout=30 \
            /tmp/deploy.sh \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/deploy.sh"

          remote_env=(
            "REPO_DIR=$deploy_dir"
            "PASSED_SHA=$PASSED_SHA"
            "IMAGE_TAG=$image_tag"
            "ALIYUN_ACR_REGISTRY=$ALIYUN_ACR_REGISTRY"
            "ALIYUN_ACR_NAMESPACE=$ALIYUN_ACR_NAMESPACE"
            "ALIYUN_ACR_USERNAME=$ALIYUN_ACR_USERNAME"
            "ALIYUN_ACR_PASSWORD=$ALIYUN_ACR_PASSWORD"
            "GHCR_USERNAME=$GHCR_USERNAME"
            "GHCR_TOKEN=$GHCR_TOKEN"
            "GHCR_REGISTRY=$GHCR_REGISTRY"
            "GHCR_NAMESPACE=$GHCR_NAMESPACE"
          )
          remote_cmd=""
          for item in "${remote_env[@]}"; do
            key="${item%%=*}"
            value="${item#*=}"
            printf -v escaped '%q=%q ' "$key" "$value"
            remote_cmd+="$escaped"
          done
          remote_cmd+="bash /tmp/deploy.sh"

          # Feed the env-prefixed command to a remote `bash -s` over stdin
          # instead of passing it as ssh argv. The secret assignments
          # (ALIYUN_ACR_PASSWORD / GHCR_TOKEN) then never appear in the deploy
          # host's process argv (visible via `ps`/`/proc` for the command's
          # lifetime); only `bash -s` does. Same idea as db-init.yml piping the
          # DB password over stdin.
          printf '%s\n' "$remote_cmd" | ssh -i ~/.ssh/deploy_key -p "$port" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o ConnectTimeout=30 \
            "$DEPLOY_USER@$DEPLOY_HOST" bash -s

      # beta deploys have no approval gate and nobody is necessarily watching
      # the Actions tab, so a silent failure could sit unnoticed. Zero-config
      # (no webhook/secret needed): open or update a GitHub issue instead.
      # Covers production too for consistency, though a human approver is
      # already watching that run.
      - name: Notify on deploy failure (open/update a GitHub issue)
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const env = '${{ needs.detect.outputs.environment }}';
            const title = `Deploy failure: ${env}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const shortSha = context.sha.substring(0, 7);
            const tag = context.ref.replace('refs/tags/', '');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deploy-failure',
            });
            const existing = issues.find((i) => i.title === title);
            const body = `Deploy to **${env}** failed for \`${shortSha}\` (tag \`${tag}\`).\n\nRun: ${runUrl}`;
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['deploy-failure'],
              });
            }

      - name: Close deploy-failure issue on successful deploy
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const env = '${{ needs.detect.outputs.environment }}';
            const title = `Deploy failure: ${env}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deploy-failure',
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Resolved: deploy to **${env}** succeeded. Run: ${runUrl}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              });
            }
