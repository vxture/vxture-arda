name: seed-demo-data

# Manually load DEMO/SAMPLE catalog data into a workspace on a deployed
# stack - NOT real product/customer data. This is the "show me what it looks
# like" dataset an operator loads into a newly onboarded tenant's workspace
# on request, purely for evaluation/demo purposes. (Renamed from `seed.yml`
# - the old name read as "seed the product's own data", which this is not.)
#
# The stack Postgres is internal to the compose network (no published port),
# so this runs on the host over SSH (same tailnet path as deploy.yml) and
# pipes prisma/seed.sql into the DB container. Idempotent (re-running upserts).
#
#   gh workflow run seed-demo-data.yml -f environment=beta -f workspace_id=<active_workspace>
#
# Get the workspace id by logging into the app and opening /auth/session.
#
# Manual-only for now by design: there is no automatic trigger tied to tenant
# onboarding. Wiring "onboard a workspace -> ask if they want demo data ->
# dispatch this workflow" would need the provisioning flow
# (portals/app/app/provisioning/) to call the GitHub API with a token scoped
# to trigger workflow_dispatch - a real feature to design deliberately, not
# bolted on here. See PR discussion for the open question.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target stack"
        required: true
        type: choice
        options:
          - beta
          - production
      workspace_id:
        description: "Workspace id to load demo data into (the user's active_workspace)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: seed-demo-data-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  seed-demo-data:
    name: seed-demo-data
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate inputs and secrets
        shell: bash
        env:
          WS: ${{ inputs.workspace_id }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          TAILSCALE_OAUTH_CLIENT_ID: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          TAILSCALE_OAUTH_CLIENT_SECRET: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$TAILSCALE_OAUTH_CLIENT_ID"
          test -n "$TAILSCALE_OAUTH_CLIENT_SECRET"
          # Guard against injection: workspace ids are opaque identifiers.
          if ! printf '%s' "$WS" | grep -Eq '^[A-Za-z0-9._:-]+$'; then
            echo "invalid workspace_id (allowed: A-Z a-z 0-9 . _ : -)" >&2
            exit 1
          fi

      - name: Join tailnet and prepare SSH
        uses: ./.github/actions/tailnet-ssh-connect
        with:
          tailscale-oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          tailscale-oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tailscale-tag: ${{ vars.TAILSCALE_OAUTH_CLIENT_TAG }}
          deploy-host: ${{ secrets.DEPLOY_HOST }}
          deploy-port: ${{ secrets.DEPLOY_PORT }}
          deploy-ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}
          deploy-known-hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

      - name: Load demo data over SSH
        shell: bash
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          WS: ${{ inputs.workspace_id }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          port="${DEPLOY_PORT:-22}"
          # container_name is ${PROJECT_NAME}-db: prod=arda-db, beta=arda-beta-db.
          # Database name follows vxturebiz_arda_{env} (data_platform_100 2.3).
          case "$ENVIRONMENT" in
            production) db="arda-db";      dbname="vxturebiz_arda_prod" ;;
            beta)       db="arda-beta-db"; dbname="vxturebiz_arda_beta" ;;
            *) echo "unknown environment: $ENVIRONMENT" >&2; exit 1 ;;
          esac
          echo "Loading demo data for workspace '$WS' into $dbname ($db) on $DEPLOY_HOST ..."
          # Pipe seed.sql to psql inside the db container (-i keeps stdin).
          # Seeding runs as the OWNER role (arda), not arda_svc; local docker
          # exec connects without a password.
          ssh -i ~/.ssh/deploy_key -p "$port" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o ConnectTimeout=30 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "docker exec -i $db psql -U arda -d $dbname -v ON_ERROR_STOP=1 -v workspace_id=$WS" \
            < portals/app/prisma/seed.sql
          echo "Done."
