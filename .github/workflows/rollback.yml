name: rollback

# Manual emergency rollback: re-point a stack at a PREVIOUSLY BUILT image
# (does not rebuild, does not touch deploy/configs/docker-compose.yml on the
# host - only swaps the arda-app image tag and recreates that one
# container). Matches the manual rollback procedure already documented in
# docs/50-deployment/{deployment,checklists}.md, just automated.
#
#   gh workflow run rollback.yml -f environment=production -f commit_sha=<sha>
#
# Find a known-good commit_sha from the target host's VERSION file
# (cat <ROOT_DIR>/deploy/VERSION) or `gh run list --workflow deploy.yml`.
#
# Same known-schema-compatibility caveat as the manual procedure: rolling
# back to an image built before a breaking DB migration can serve traffic
# against a schema its code does not expect - verify compatibility first for
# anything beyond a straightforward app-code revert.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target stack"
        required: true
        type: choice
        options:
          - beta
          - production
      commit_sha:
        description: "Commit SHA of a PREVIOUSLY DEPLOYED build to roll back to (full or unambiguous short form)"
        required: true
        type: string

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  rollback:
    name: rollback
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Checkout target revision
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 1

      - name: Resolve image tag
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          full_sha="$(git rev-parse HEAD)"
          short_sha="${full_sha::7}"
          echo "image_tag=sha-$short_sha" >> "$GITHUB_OUTPUT"
          echo "resolved: full_sha=$full_sha image_tag=sha-$short_sha"

      - name: Validate secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          ALIYUN_ACR_REGISTRY: ${{ vars.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_NAMESPACE: ${{ vars.ALIYUN_ACR_NAMESPACE }}
          TAILSCALE_OAUTH_CLIENT_ID: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          TAILSCALE_OAUTH_CLIENT_SECRET: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$ALIYUN_ACR_REGISTRY"
          test -n "$ALIYUN_ACR_NAMESPACE"
          test -n "$TAILSCALE_OAUTH_CLIENT_ID"
          test -n "$TAILSCALE_OAUTH_CLIENT_SECRET"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Fail clearly here rather than mid-rollback if the operator gave a
      # commit that was never actually built and pushed.
      - name: Confirm the image actually exists
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.sha.outputs.image_tag }}
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "ghcr.io/vxture/arda-app:${IMAGE_TAG}" >/dev/null

      - name: Join tailnet and prepare SSH
        uses: ./.github/actions/tailnet-ssh-connect
        with:
          tailscale-oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          tailscale-oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tailscale-tag: ${{ vars.TAILSCALE_OAUTH_CLIENT_TAG }}
          deploy-host: ${{ secrets.DEPLOY_HOST }}
          deploy-port: ${{ secrets.DEPLOY_PORT }}
          deploy-ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}
          deploy-known-hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

      - name: Roll back over SSH
        shell: bash
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_REPO_DIR: ${{ secrets.DEPLOY_REPO_DIR }}
          IMAGE_TAG: ${{ steps.sha.outputs.image_tag }}
          ALIYUN_ACR_REGISTRY: ${{ vars.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_NAMESPACE: ${{ vars.ALIYUN_ACR_NAMESPACE }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          port="${DEPLOY_PORT:-22}"
          case "$DEPLOY_ENV" in
            production) default_dir="/srv/md0/arda/deploy" ;;
            beta)       default_dir="/srv/md1/arda-beta/deploy" ;;
            *) echo "unknown environment: $DEPLOY_ENV" >&2; exit 1 ;;
          esac
          deploy_dir="${DEPLOY_REPO_DIR:-$default_dir}"

          cat > /tmp/rollback.sh <<'REMOTE_SCRIPT'
          set -euo pipefail
          cd "$REPO_DIR"

          export IMAGE_REGISTRY="ghcr.io"
          export IMAGE_NAMESPACE="vxture"
          export IMAGE_TAG="$IMAGE_TAG"

          docker_login_with_retry() {
            local attempt
            for attempt in 1 2 3 4 5 6; do
              curl -fsSI "https://${ALIYUN_ACR_REGISTRY}/v2/" >/dev/null 2>&1 || true
              if printf '%s' "$ALIYUN_ACR_PASSWORD" \
                | timeout 45 docker login "$ALIYUN_ACR_REGISTRY" -u "$ALIYUN_ACR_USERNAME" --password-stdin; then
                return 0
              fi
              sleep $((attempt * 5))
            done
            return 1
          }

          if [ -n "${ALIYUN_ACR_USERNAME:-}" ] && [ -n "${ALIYUN_ACR_PASSWORD:-}" ]; then
            docker_login_with_retry
          fi
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

          export FALLBACK_IMAGE_REGISTRY="$ALIYUN_ACR_REGISTRY"
          export FALLBACK_IMAGE_NAMESPACE="$ALIYUN_ACR_NAMESPACE"

          echo "[rollback] Pulling and recreating arda-app at $IMAGE_TAG ..."
          bash deploy.sh start
          bash deploy.sh verify
          REMOTE_SCRIPT

          scp -i ~/.ssh/deploy_key -P "$port" \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o ConnectTimeout=30 \
            /tmp/rollback.sh \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/rollback.sh"

          remote_env=(
            "REPO_DIR=$deploy_dir"
            "IMAGE_TAG=$IMAGE_TAG"
            "ALIYUN_ACR_REGISTRY=$ALIYUN_ACR_REGISTRY"
            "ALIYUN_ACR_NAMESPACE=$ALIYUN_ACR_NAMESPACE"
            "ALIYUN_ACR_USERNAME=$ALIYUN_ACR_USERNAME"
            "ALIYUN_ACR_PASSWORD=$ALIYUN_ACR_PASSWORD"
            "GHCR_USERNAME=$GHCR_USERNAME"
            "GHCR_TOKEN=$GHCR_TOKEN"
          )
          remote_cmd=""
          for item in "${remote_env[@]}"; do
            key="${item%%=*}"
            value="${item#*=}"
            printf -v escaped '%q=%q ' "$key" "$value"
            remote_cmd+="$escaped"
          done
          remote_cmd+="bash /tmp/rollback.sh"

          ssh -i ~/.ssh/deploy_key -p "$port" \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o ConnectTimeout=30 \
            "$DEPLOY_USER@$DEPLOY_HOST" "$remote_cmd"
